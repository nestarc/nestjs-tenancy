services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: tenancy
      POSTGRES_PASSWORD: tenancy
      POSTGRES_DB: tenancy_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tenancy"]
      interval: 2s
      timeout: 5s
      retries: 10
